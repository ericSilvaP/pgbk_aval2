openapi: 3.0.3
info:
  title: Trip Request Cancellation API Contract
  version: 1.0.0
  description: Contract for canceling a persisted trip request.
paths:
  /trip-requests/{id}/cancel:
    patch:
      summary: Cancel a persisted trip request
      operationId: cancelTripRequest
      description: >-
        Changes the target trip request status from pending to canceled and
        returns the updated trip request in the standard success envelope.
        Repeated cancellation attempts are rejected with a standardized
        conflict error, and missing identifiers return the standardized
        not-found error.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Persisted trip request identifier.
      responses:
        '200':
          description: Trip request canceled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripRequestSuccessEnvelope'
              examples:
                canceled:
                  value:
                    success: true
                    data:
                      id: 11111111-1111-1111-1111-111111111111
                      requesterName: Maria Silva
                      origin: Fortaleza
                      destination: Recife
                      departureAt: 2026-07-10T11:00:00.000Z
                      returnAt: 2026-07-12T21:30:00.000Z
                      purpose: Institutional meeting
                      passengerCount: 2
                      status: canceled
                      createdAt: 2026-06-26T15:45:10.123Z
        '404':
          description: No persisted trip request matches the provided identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                notFound:
                  value:
                    success: false
                    error:
                      code: TRIP_REQUEST_NOT_FOUND
                      message: Trip request not found
        '409':
          description: The persisted trip request is already canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                alreadyCanceled:
                  value:
                    success: false
                    error:
                      code: TRIP_REQUEST_ALREADY_CANCELED
                      message: Trip request is already canceled
        '500':
          description: Unexpected repository failure handled centrally
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                internalError:
                  value:
                    success: false
                    error:
                      code: INTERNAL_SERVER_ERROR
                      message: Internal server error
components:
  schemas:
    TripRequest:
      type: object
      required:
        - id
        - requesterName
        - origin
        - destination
        - departureAt
        - returnAt
        - purpose
        - passengerCount
        - status
        - createdAt
      properties:
        id:
          type: string
        requesterName:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureAt:
          type: string
          format: date-time
        returnAt:
          type: string
          format: date-time
        purpose:
          type: string
        passengerCount:
          type: integer
        status:
          type: string
          enum: [pending, canceled]
        createdAt:
          type: string
          format: date-time
    TripRequestSuccessEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/TripRequest'
    ErrorEnvelope:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - TRIP_REQUEST_NOT_FOUND
                - TRIP_REQUEST_ALREADY_CANCELED
                - INTERNAL_SERVER_ERROR
            message:
              type: string
