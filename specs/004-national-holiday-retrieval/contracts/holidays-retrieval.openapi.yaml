openapi: 3.0.3
info:
  title: National Holiday Retrieval API Contract
  version: 1.0.0
  description: >-
    Contract for retrieving Brazilian national holidays for a requested year.
    This endpoint is read-only, does not persist holiday data in PostgreSQL,
    and does not read or mutate trip-request data.
paths:
  /holidays/{year}:
    get:
      summary: Retrieve Brazilian national holidays for a year
      operationId: getNationalHolidays
      description: >-
        Validates a required four-digit year path parameter, queries BrasilAPI
        through the configured holidays provider, and returns the result in the
        standardized success envelope. The endpoint is read-only, does not
        persist holidays locally, does not read or mutate trip-request data,
        and returns only `date`, `name`, and `type` for each holiday item.
      parameters:
        - name: year
          in: path
          required: true
          description: >-
            Four-digit numeric year from 1000 to 9999. Values such as `0000`,
            `0999`, `10000`, `abcd`, `20a5`, `25`, and `202` are rejected with
            `VALIDATION_ERROR`.
          schema:
            type: string
            pattern: '^\d{4}$'
            minLength: 4
            maxLength: 4
            example: '2025'
      responses:
        '200':
          description: >-
            National holidays for the requested year were retrieved
            successfully. The `data` field is always an array and may be
            empty. Each holiday item contains exactly `date`, `name`, and
            `type`; unknown upstream fields are excluded from the response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolidayCollectionSuccessEnvelope'
              examples:
                populated:
                  value:
                    success: true
                    data:
                      - date: '2025-01-01'
                        name: Confraternizacao Universal
                        type: national
                      - date: '2025-04-21'
                        name: Tiradentes
                        type: national
                empty:
                  value:
                    success: true
                    data: []
        '400':
          description: >-
            The supplied year is missing the required four-digit numeric format
            or falls outside the supported range from 1000 to 9999. Invalid
            values such as `0000`, `0999`, `10000`, `abcd`, `20a5`, `25`, and
            `202` return `VALIDATION_ERROR`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalidYear:
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: year must be a four-digit number between 1000 and 9999
        '502':
          description: >-
            BrasilAPI is unavailable, times out, returns a non-success status,
            or returns an invalid payload. All such upstream failures are
            normalized to the same standardized error contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                upstreamNonSuccess:
                  value:
                    success: false
                    error:
                      code: HOLIDAYS_API_UNAVAILABLE
                      message: Holidays API unavailable
                upstreamTimeout:
                  value:
                    success: false
                    error:
                      code: HOLIDAYS_API_UNAVAILABLE
                      message: Holidays API unavailable
                invalidUpstreamPayload:
                  value:
                    success: false
                    error:
                      code: HOLIDAYS_API_UNAVAILABLE
                      message: Holidays API unavailable
        '500':
          description: >-
            Unexpected internal failure handled centrally through the shared
            error handler without leaking internal details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                internalError:
                  value:
                    success: false
                    error:
                      code: INTERNAL_SERVER_ERROR
                      message: Internal server error
components:
  schemas:
    Holiday:
      type: object
      required:
        - date
        - name
        - type
      additionalProperties: false
      properties:
        date:
          type: string
          format: date
          example: '2025-01-01'
        name:
          type: string
          example: Confraternizacao Universal
        type:
          type: string
          example: national
    HolidayCollectionSuccessEnvelope:
      type: object
      required:
        - success
        - data
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Holiday'
    ErrorEnvelope:
      type: object
      required:
        - success
        - error
      additionalProperties: false
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required:
            - code
            - message
          additionalProperties: false
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - HOLIDAYS_API_UNAVAILABLE
                - INTERNAL_SERVER_ERROR
            message:
              type: string
