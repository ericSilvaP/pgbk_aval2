services:
  postgres:
    image: postgres:16-alpine
    container_name: pgbk_aval2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trip_requests_db
    ports:
      # Published on 5434 to match DATABASE_URL in .env.example.
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d trip_requests_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
